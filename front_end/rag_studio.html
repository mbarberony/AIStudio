<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #151515;
            --bg-tertiary: #1f1f1f;
            --accent-primary: #00ff88;
            --accent-secondary: #0088ff;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border-color: #2a2a2a;
            --danger: #ff3366;
            --warning: #ffaa00;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-family: 'Space Mono', monospace;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sidebar-section {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-section-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .model-select, .corpus-select, select, input[type="number"] {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        .model-select:hover, .corpus-select:hover, select:hover {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 2px rgba(0, 255, 136, 0.1);
        }

        .parameter-group {
            margin-bottom: 16px;
        }

        .parameter-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            display: block;
        }

        .corpus-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn-icon {
            flex: 1;
            padding: 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
        }

        .btn-icon:hover {
            background: var(--accent-primary);
            color: var(--bg-primary);
            border-color: var(--accent-primary);
        }

        .sidebar-scroll {
            flex: 1;
            overflow-y: auto;
        }

        /* Main Chat Area */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .chat-header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-primary);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .message {
            display: flex;
            gap: 16px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message-avatar.user {
            background: linear-gradient(135deg, var(--accent-secondary), var(--accent-primary));
        }

        .message-avatar.assistant {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
        }

        .message-content {
            flex: 1;
            line-height: 1.6;
        }

        .message.user .message-content {
            color: var(--text-primary);
        }

        .message.assistant .message-content {
            color: var(--text-secondary);
        }

        .message-content pre {
            background: var(--bg-tertiary);
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 12px 0;
            border: 1px solid var(--border-color);
        }

        .message-content code {
            font-family: 'Space Mono', monospace;
            font-size: 13px;
        }

        .input-area {
            padding: 20px 30px;
            border-top: 1px solid var(--border-color);
            background: var(--bg-secondary);
        }

        .input-wrapper {
            position: relative;
            max-width: 800px;
            margin: 0 auto;
        }

        .chat-input {
            width: 100%;
            padding: 16px 60px 16px 20px;
            background: var(--bg-tertiary);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            resize: none;
            transition: all 0.2s;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.1);
        }

        .send-button {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background: var(--accent-primary);
            border: none;
            border-radius: 8px;
            color: var(--bg-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.2s;
        }

        .send-button:hover {
            transform: translateY(-50%) scale(1.05);
            box-shadow: 0 4px 12px rgba(0, 255, 136, 0.3);
        }

        .send-button:disabled {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            cursor: not-allowed;
            transform: translateY(-50%);
        }

        .loading {
            display: flex;
            gap: 6px;
            padding: 12px 0;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-primary);
            animation: loading 1.4s ease-in-out infinite;
        }

        .loading-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes loading {
            0%, 80%, 100% {
                opacity: 0.3;
                transform: scale(0.8);
            }
            40% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 64px;
            opacity: 0.3;
        }

        .empty-state-text {
            font-size: 18px;
            font-weight: 500;
        }

        .empty-state-hint {
            font-size: 14px;
            opacity: 0.7;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-primary);
        }

        /* File upload modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .file-drop-zone {
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        .file-drop-zone:hover, .file-drop-zone.drag-over {
            border-color: var(--accent-primary);
            background: rgba(0, 255, 136, 0.05);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent-primary);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            box-shadow: 0 4px 12px rgba(0, 255, 136, 0.3);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--border-color);
        }

        /* Debug panel */
        .debug-panel {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            margin-top: 12px;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
        }

        .debug-title {
            font-weight: 700;
            color: var(--accent-primary);
            margin-bottom: 8px;
        }

        .debug-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .debug-item:last-child {
            border-bottom: none;
        }

        .debug-label {
            color: var(--text-secondary);
        }

        .debug-value {
            color: var(--text-primary);
            font-weight: 700;
        }

        /* ============================================================================
           PART 1: CSS - Add to <style> section
           ============================================================================ */

        /* Citation superscripts */
        .citation-ref {
            color: var(--accent-secondary);
            font-size: 0.75em;
            vertical-align: super;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            margin: 0 1px;
            transition: all 0.2s;
        }

        .citation-ref:hover {
            color: var(--accent-primary);
            text-decoration: underline;
        }

        /* Footnotes section */
        .footnotes-section {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        .footnotes-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .footnote-item {
            margin-bottom: 12px;
            padding-left: 24px;
            position: relative;
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .footnote-number {
            position: absolute;
            left: 0;
            color: var(--accent-secondary);
            font-weight: 600;
        }

        .footnote-source {
            color: var(--text-primary);
            font-weight: 500;
        }

        .footnote-page {
            color: var(--accent-primary);
            margin-left: 8px;
        }

        .footnote-link {
            color: var(--accent-secondary);
            text-decoration: none;
            margin-left: 8px;
            font-size: 11px;
        }

        .footnote-link:hover {
            text-decoration: underline;
        }

        /* Conversation context indicator */
        .context-indicator {
            display: inline-block;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 11px;
            color: var(--text-secondary);
            margin-left: 8px;
        }

        .context-indicator.active {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        /* Clear conversation button */
        .clear-conversation {
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 12px;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }

        .clear-conversation:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* ========================================================================
           CITATION STYLES
           ======================================================================== */

        /* Citation superscripts */
        .citation-ref {
            color: var(--accent-secondary);
            font-size: 0.75em;
            vertical-align: super;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            margin: 0 1px;
            transition: all 0.2s;
        }

        .citation-ref:hover {
            color: var(--accent-primary);
            text-decoration: underline;
        }

        /* Footnotes section */
        .footnotes-section {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        .footnotes-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .footnote-item {
            margin-bottom: 12px;
            padding-left: 24px;
            position: relative;
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .footnote-number {
            position: absolute;
            left: 0;
            color: var(--accent-secondary);
            font-weight: 600;
        }

        .footnote-source {
            color: var(--text-primary);
            font-weight: 500;
        }

        .footnote-page {
            color: var(--accent-primary);
            margin-left: 8px;
        }

        .footnote-link {
            color: var(--accent-secondary);
            text-decoration: none;
            margin-left: 8px;
            font-size: 11px;
        }

        .footnote-link:hover {
            text-decoration: underline;
        }


    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">RAG_STUDIO</div>
            </div>
            
            <div class="sidebar-scroll">
                <!-- Model Selection -->
                <div class="sidebar-section">
                    <div class="sidebar-section-title">Model</div>
                    <select class="model-select" id="modelSelect">
                        <option value="">Loading models...</option>
                    </select>
                </div>

                <!-- Corpus Selection -->
                <div class="sidebar-section">
                    <div class="sidebar-section-title">Current Corpus</div>
                    <select class="corpus-select" id="corpusSelect">
                        <option value="default">default</option>
                    </select>
                    <div class="corpus-actions">
                        <button class="btn-icon" id="addFileBtn" title="Add file to corpus">+</button>
                        <button class="btn-icon" id="inspectCorpusBtn" title="Inspect corpus">📊</button>
                        <button class="btn-icon" id="createCorpusBtn" title="Create new corpus">📁</button>
                    </div>
                </div>

                <!-- Search Parameters -->
                <div class="sidebar-section">
                    <div class="sidebar-section-title">Parameters</div>
                    
                    <div class="parameter-group">
                        <label class="parameter-label">Temperature</label>
                        <input type="number" id="temperature" min="0" max="2" step="0.1" value="0.7" placeholder="0.7">
                    </div>

                    <div class="parameter-group">
                        <label class="parameter-label">Top K</label>
                        <input type="number" id="topK" min="1" max="20" step="1" value="5" placeholder="5">
                    </div>

                    <div class="parameter-group">
                        <label class="parameter-label">Top P</label>
                        <input type="number" id="topP" min="0" max="1" step="0.05" value="0.9" placeholder="0.9">
                    </div>
                </div>

                <!-- Debug Info -->
                <div class="sidebar-section">
                    <div class="sidebar-section-title">System</div>
                    <div id="debugInfo" class="debug-panel" style="display: none;">
                        <div class="debug-title">Status</div>
                        <div id="debugContent"></div>
                    </div>
                    <button class="btn-icon" id="toggleDebug" style="width: 100%;">🔧 Debug</button>
                </div>
            </div>

            <!-- PART 3: HTML Updates -->

            <div class="sidebar-section">
                <div class="sidebar-section-title">Conversation</div>
                <div>
                    <span id="contextIndicator" class="context-indicator">No context</span>
                </div>
                <button class="clear-conversation" onclick="clearConversation()">
                    Clear Conversation
                </button>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="chat-container">
            <div class="chat-header">
                <div class="chat-title" id="chatTitle">Ready to query your corpus</div>
                <div class="status-indicator">
                    <div class="status-dot"></div>
                    <span>Connected</span>
                </div>
            </div>

            <div class="messages-container" id="messagesContainer">
                <div class="empty-state">
                    <div class="empty-state-icon">💬</div>
                    <div class="empty-state-text">Start a conversation</div>
                    <div class="empty-state-hint">Ask questions about your corpus</div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea 
                        class="chat-input" 
                        id="chatInput" 
                        placeholder="Ask a question about your corpus..."
                        rows="1"
                    ></textarea>
                    <button class="send-button" id="sendButton">➤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- File Upload Modal -->
    <div class="modal" id="uploadModal">
        <div class="modal-content">
            <div class="modal-title">Upload File to Corpus</div>
            <div class="file-drop-zone" id="dropZone">
                <div style="font-size: 48px; margin-bottom: 12px;">📄</div>
                <div style="margin-bottom: 8px;">Drop your file here or click to browse</div>
                <div style="font-size: 12px; color: var(--text-secondary);">Supported: TXT, PDF, MD, JSON</div>
                <input type="file" id="fileInput" style="display: none;">
            </div>
            <div id="uploadStatus"></div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" id="cancelUpload">Cancel</button>
                <button class="btn btn-primary" id="confirmUpload" disabled>Upload</button>
            </div>
        </div>
    </div>

    <script>
        // API Configuration
        const API_BASE = 'http://localhost:8000';

        // State
        let currentCorpus = null; // Start with null instead of 'default'
        let currentModel = null;
        let selectedFile = null;
        let isLoading = false;

        // DOM Elements
        const messagesContainer = document.getElementById('messagesContainer');
        const chatInput = document.getElementById('chatInput');
        const sendButton = document.getElementById('sendButton');
        const modelSelect = document.getElementById('modelSelect');
        const corpusSelect = document.getElementById('corpusSelect');
        const temperatureInput = document.getElementById('temperature');
        const topKInput = document.getElementById('topK');
        const topPInput = document.getElementById('topP');
        const uploadModal = document.getElementById('uploadModal');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const debugInfo = document.getElementById('debugInfo');
        const debugContent = document.getElementById('debugContent');

        // Initialize
        async function init() {
            await loadModels();
            await loadCorpora();
            await loadConfig();
        }



        // Load available models
        async function loadModels() {
            try {
                const response = await fetch(`${API_BASE}/models`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const models = await response.json();
                
                if (models.length === 0) {
                    modelSelect.innerHTML = '<option value="">No models found - Check Ollama</option>';
                    return;
                }
                
                modelSelect.innerHTML = models.map(model => 
                    `<option value="${model.id}" ${!model.available ? 'disabled' : ''}>
                        ${model.name} ${!model.available ? '(unavailable)' : ''}
                    </option>`
                ).join('');
                
                if (models.length > 0) {
                    currentModel = models.find(m => m.available)?.id || models[0].id;
                    modelSelect.value = currentModel;
                }
            } catch (error) {
                console.error('Failed to load models:', error);
                // Provide helpful fallback
                modelSelect.innerHTML = '<option value="">Ollama not running - Start with: ollama serve</option>';
            }
        }

        // Load available corpora
        async function loadCorpora() {
            try {
                const response = await fetch(`${API_BASE}/corpora`);
                const corpora = await response.json();
                
                if (corpora.length === 0) {
                    corpusSelect.innerHTML = '<option value="">No corpora - Create one below 📁</option>';
                    currentCorpus = null;
                    updatePlaceholder();
                    return;
                }
                
                corpusSelect.innerHTML = corpora.map(corpus => 
                    `<option value="${corpus.name}">${corpus.name} (${corpus.document_count || 0} docs)</option>`
                ).join('');
                
                // Set to first available corpus
                currentCorpus = corpora[0].name;
                corpusSelect.value = currentCorpus;
                document.getElementById('chatTitle').textContent = `Querying: ${currentCorpus}`;
                updatePlaceholder();
            } catch (error) {
                console.error('Failed to load corpora:', error);
                corpusSelect.innerHTML = '<option value="">Error loading corpora</option>';
                currentCorpus = null;
                updatePlaceholder();
            }
        }
        
        // Update chat input placeholder based on corpus state
        function updatePlaceholder() {
            if (!currentCorpus) {
                chatInput.placeholder = "⚠️ Select or create a corpus first";
                chatInput.disabled = true;
                sendButton.disabled = true;
            } else {
                chatInput.placeholder = `Ask a question about ${currentCorpus}...`;
                chatInput.disabled = false;
                sendButton.disabled = false;
            }
        }

        // Load configuration
        async function loadConfig() {
            try {
                const response = await fetch(`${API_BASE}/config`);
                const config = await response.json();
                
                if (config.parameters.top_k) {
                    topKInput.value = config.parameters.top_k;
                }
                
                updateDebugInfo(config);
            } catch (error) {
                console.error('Failed to load config:', error);
            }
        }

        // Send message
        async function sendMessage() {
            const query = chatInput.value.trim();
            if (!query || isLoading) return;
            
            // Check if corpus is selected
            if (!currentCorpus) {
                addMessage('⚠️ Please select or create a corpus first', 'assistant');
                return;
            }

            // Clear input
            chatInput.value = '';
            chatInput.style.height = 'auto';

            // Add user message
            addMessage(query, 'user');

            // Show loading
            isLoading = true;
            sendButton.disabled = true;
            const loadingId = addLoadingMessage();

            try {
                const response = await fetch(`${API_BASE}/ask`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        query: query,
                        corpus: currentCorpus,
                        top_k: parseInt(topKInput.value) || 5,
                        temperature: parseFloat(temperatureInput.value) || 0.7,
                        top_p: parseFloat(topPInput.value) || 0.9,
                    })
                });

                const data = await response.json();

                console.log('Response data:', data);
                console.log('Has citations:', data.has_citations);
                console.log('Citations:', data.citations);
                
                // Remove loading message
                removeMessage(loadingId);
                
                // Process citations if present
                let answerContent = data.answer;
                if (data.has_citations && data.citations) {
                    console.log('Processing citations...');
                    answerContent = parseCitations(data.answer, data.citations);
                    answerContent += renderFootnotes(data.citations);
                    console.log('Processed answer:', answerContent);
                }
                
                // Add assistant response with HTML rendering enabled for citations
                addMessage(answerContent, 'assistant', true);
                
            } catch (error) {
                removeMessage(loadingId);
                addMessage(`Error: ${error.message}`, 'assistant');
            } finally {
                isLoading = false;
                sendButton.disabled = false;
            }
        }

        // Add message to chat
        function addMessage(content, role, allowHtml = false) {
            // Remove empty state if exists
            const emptyState = messagesContainer.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            // For assistant messages with citations, allow HTML
            // For user messages, always escape HTML for security
            const messageContent = (role === 'assistant' && allowHtml) 
                ? content 
                : escapeHtml(content);
            
            messageDiv.innerHTML = `
                <div class="message-avatar ${role}">
                    ${role === 'user' ? '👤' : '🤖'}
                </div>
                <div class="message-content">${messageContent}</div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            return messageDiv;
        }

        // Add loading message
        function addLoadingMessage() {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.id = 'loading-message';
            loadingDiv.innerHTML = `
                <div class="message-avatar assistant">🤖</div>
                <div class="message-content">
                    <div class="loading">
                        <div class="loading-dot"></div>
                        <div class="loading-dot"></div>
                        <div class="loading-dot"></div>
                    </div>
                </div>
            `;
            
            messagesContainer.appendChild(loadingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            return 'loading-message';
        }

        // Remove message
        function removeMessage(id) {
            const message = document.getElementById(id);
            if (message) {
                message.remove();
            }
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Update debug info
        function updateDebugInfo(config) {
            debugContent.innerHTML = `
                <div class="debug-item">

                </div>

        }

        // Inspect corpus
        async function inspectCorpus() {
            try {
                const response = await fetch(`${API_BASE}/corpus/${currentCorpus}/info`);
                const data = await response.json();
                
                const statsResponse = await fetch(`${API_BASE}/debug/stats?corpus=${currentCorpus}`);
                const stats = await statsResponse.json();
                
                addMessage(

                addMessage(`Error inspecting corpus: ${error.message}`, 'assistant');

        // ========================================================================
        // CITATION FUNCTIONS
        // ========================================================================
        
        /**
         * Parse citations from answer text and create clickable superscripts
         */
        function parseCitations(answer, citations) {
            if (!citations || citations.length === 0) {
                return answer;
            }
            
            let parsedAnswer = answer;
            
            // Pattern 1: Match [1], [2], [1,2,3], [1, 2, 3]
            const numberPattern = /\[(\d+(?:,\s*\d+)*)\]/g;
            parsedAnswer = parsedAnswer.replace(numberPattern, (match, numbers) => {
                const nums = numbers.split(',').map(n => n.trim());
                const links = nums.map(num => 
                    `<a href="#footnote-${num}" class="citation-ref">[${num}]</a>`
                ).join('');
                return links;
            });
            
            // Pattern 2: Match [Source 1], [Source 2]
            const sourcePattern = /\[Source\s+(\d+)\]/gi;
            parsedAnswer = parsedAnswer.replace(sourcePattern, (match, number) => {
                return `<a href="#footnote-${number}" class="citation-ref">[${number}]</a>`;
            });
            
            return parsedAnswer;
        }

        /**
         * Render footnotes section
         */
        function renderFootnotes(citations) {
            if (!citations || citations.length === 0) {
                return '';
            }
            
            let footnotesHTML = `
                <div class="footnotes-section">
                    <div class="footnotes-title">References</div>
            `;
            
            citations.forEach(citation => {
                const fileName = citation.source.split('/').pop();
                const pageInfo = citation.page ? `<span class="footnote-page">Page ${citation.page}</span>` : '';
                
                footnotesHTML += `
                    <div class="footnote-item" id="footnote-${citation.index}">
                        <span class="footnote-number">[${citation.index}]</span>
                        <span class="footnote-source">${fileName}</span>
                        ${pageInfo}
                    </div>
                `;
            });
            
            footnotesHTML += '</div>';
            return footnotesHTML;
        }

        // ========================================================================
        // END CITATION FUNCTIONS
        // ========================================================================

        document.addEventListener('DOMContentLoaded', function() {

        document.getElementById('createCorpusBtn').addEventListener('click', async () => {

                });

                await loadCorpora();

        // Initialize app
        init();

        // Conversation memory storage
        let conversationHistory = [];

        // Maximum conversation turns to keep (configurable)
        const MAX_CONVERSATION_TURNS = 10;

        /**
         * Add message to conversation history
         */
        function addToConversation(role, content) {
            conversationHistory.push({
                role: role,
                content: content
            });

            // Keep only last N turns (N*2 messages since each turn has user + assistant)
            if (conversationHistory.length > MAX_CONVERSATION_TURNS * 2) {
                conversationHistory = conversationHistory.slice(-MAX_CONVERSATION_TURNS * 2);
            }

            updateContextIndicator();
        }

        /**
         * Clear conversation history
         */
        function clearConversation() {
            conversationHistory = [];
            updateContextIndicator();
            showStatus('Conversation cleared', 'success');
        }

        /**
         * Update the context indicator in UI
         */
        function updateContextIndicator() {
            const indicator = document.getElementById('contextIndicator');
            if (!indicator) return;

            const turns = Math.floor(conversationHistory.length / 2);

            if (turns > 0) {
                indicator.textContent = `${turns} turn${turns > 1 ? 's' : ''} in memory`;
                indicator.classList.add('active');
            } else {
                indicator.textContent = 'No context';
                indicator.classList.remove('active');
            }
        }

        /**
         * Parse citations from answer text and create clickable superscripts
         */
        function parseCitations(answer, citations) {
            if (!citations || citations.length === 0) {
                return answer;
            }

            let parsedAnswer = answer;

            // Pattern 1: Match [1], [2], [1,2,3]
            const numberPattern = /\[(\d+(?:,\s*\d+)*)\]/g;
            parsedAnswer = parsedAnswer.replace(numberPattern, (match, numbers) => {
                const nums = numbers.split(',').map(n => n.trim());
                const links = nums.map(num =>
                    `<a href="#footnote-${num}" class="citation-ref">[${num}]</a>`
                ).join('');
                return links;
            });

    // Pattern 2: Match [Source 1], [Source 2]
    const sourcePattern = /\[Source\s+(\d+)\]/gi;
    parsedAnswer = parsedAnswer.replace(sourcePattern, (match, number) => {
        return `<a href="#footnote-${number}" class="citation-ref">[${number}]</a>`;
    });

    return parsedAnswer;
}

        /**
         * Render footnotes section
         */
        function renderFootnotes(citations) {
            if (!citations || citations.length === 0) {
                return '';
            }

            let footnotesHTML = `
                <div class="footnotes-section">
                    <div class="footnotes-title">References</div>
            `;

            citations.forEach(citation => {
                const fileName = citation.source.split('/').pop();
                const pageInfo = citation.page ? `<span class="footnote-page">Page ${citation.page}</span>` : '';
                const link = `<a href="#" class="footnote-link" onclick="openSource('${citation.source}', ${citation.page}); return false;">↗ Open</a>`;

                footnotesHTML += `
                    <div class="footnote-item" id="footnote-${citation.index}">
                        <span class="footnote-number">[${citation.index}]</span>
                        <span class="footnote-source">${fileName}</span>
                        ${pageInfo}
                        ${link}
                    </div>
                `;
            });

            footnotesHTML += '</div>';
            return footnotesHTML;
        }

        /**
         * Enhanced sendQuery function with citations and conversation memory
         * REPLACE your existing sendQuery() function with this
         */
        async function sendQuery() {

            console.log('sendQuery called!');  // ADD THIS LINE
            console.log('parseCitations exists?', typeof parseCitations);  // ADD THIS LINE

            const queryInput = document.getElementById('queryInput');
            const chatMessages = document.getElementById('chatMessages');
            const query = queryInput.value.trim();

            if (!query) return;

            // Add user message to UI
            appendMessage('user', query);
            queryInput.value = '';

            // Add to conversation history
            addToConversation('user', query);

            // Show loading state
            const loadingId = Date.now();
            appendMessage('assistant', '...', loadingId);

            try {
                const corpus = document.getElementById('corpusSelect').value;
                const topK = parseInt(document.getElementById('topK').value) || 5;

                // Build request with conversation history
                const requestBody = {
                    query: query,
                    corpus: corpus,
                    top_k: topK,
                    conversation_history: conversationHistory.length > 0 ? conversationHistory : null
                };

                const response = await fetch('http://localhost:8000/ask', {

                        'Content-Type': 'application/json',

        if (data.has_citations && data.citations) {

            console.log('AFTER parsing:', answerHTML);

            footnotesHTML = renderFootnotes(data.citations);
            console.log('Footnotes HTML:', footnotesHTML);
        }

                // Add assistant message with citations

                addToConversation('assistant', data.answer);

            } catch (error) {

                document.getElementById(`msg-${loadingId}`)?.remove();

        /**
         * Enhanced appendMessage to handle HTML content
         * UPDATE your existing appendMessage() function
         */
        function appendMessage(role, content, id = null, isError = false) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}-message${isError ? ' error-message' : ''}`;
            if (id) messageDiv.id = `msg-${id}`;

            // Use innerHTML for assistant messages to render citations
            if (role === 'assistant') {
                messageDiv.innerHTML = content;
            } else {
                messageDiv.textContent = content;
            }

            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
