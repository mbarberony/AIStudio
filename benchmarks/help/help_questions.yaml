- topic: Installation and Setup
  questions:

    - id: qdrant_install_method
      question: How is the Qdrant binary installed in AIStudio — what curl command is used and where is the binary moved to?
      keywords: [curl, aarch64, ~/bin]
      notes: >
        QUICKSTART Step 5 — specific curl command downloading aarch64 binary,
        moved to ~/bin/. Distinctive terms that only appear in the Qdrant
        install chunk and cannot be answered from general knowledge.

    - id: venv_activation
      question: What command activates the AIStudio Python virtual environment and what prompt change confirms it?
      keywords: [venv, activate, .venv]
      notes: >
        QUICKSTART Step 8 — specific to AIStudio's venv path and prompt indicator.

    - id: pango_requirement
      question: What system library does WeasyPrint require and how is it installed on macOS for AIStudio?
      keywords: [pango, WeasyPrint, brew]
      notes: >
        QUICKSTART Step 1 — pango is required by WeasyPrint for PDF generation.
        WeasyPrint keyword forces the right chunk.

    - id: qdrant_wal_error
      question: What causes the Qdrant WAL lock error and how do you fix it?
      keywords: [WAL, lock, collection]
      notes: >
        HOWTO troubleshooting section — specific error pattern with specific fix.

