# AIStudio Ingest Test Sets
# Version: 1.1.0
# Used by benchmarks/ingest_test.py
# Fixtures must be present in benchmarks/fixtures/ (gitignored)
# Seed fixtures with: ais_ingest_test --seed

sets:

  - id: set_6
    description: "6-file AIG cohort — skip regression and MD5 validation"
    notes: >
      Core regression test. Ingest 6 AIG 10-K filings, verify chunks, re-ingest
      same 6 and verify 0 new / 6 skipped. Validates skip logic and MD5 storage.
    files:
      - AIG_10K_2021-02-19.htm
      - AIG_10K_2022-02-17.htm
      - AIG_10K_2023-02-17.htm
      - AIG_10K_2024-02-14.htm
      - AIG_10K_2025-02-13.htm
      - AIG_10K_2026-02-12.htm

  - id: set_6_plus_1
    description: "6 known AIG + 1 new AllianceBernstein — mixed batch test"
    notes: >
      Tests mixed batch behavior: 6 files already indexed (should skip),
      1 new file (should ingest). Expected: 1 new, 6 skipped.
    files:
      - AIG_10K_2021-02-19.htm
      - AIG_10K_2022-02-17.htm
      - AIG_10K_2023-02-17.htm
      - AIG_10K_2024-02-14.htm
      - AIG_10K_2025-02-13.htm
      - AIG_10K_2026-02-12.htm
      - AllianceBernstein_10K_2018-02-13.htm

  - id: set_10
    description: "6 AIG + 4 AllianceBernstein — used by --test 2/3/4 mixed batch tests"
    notes: >
      Base 6 AIG files plus 4 AllianceBernstein files. The 4 AB files serve as
      the "new" files in tests 2, 3, and 4. set_6 is the base subset.
    files:
      - AIG_10K_2021-02-19.htm
      - AIG_10K_2022-02-17.htm
      - AIG_10K_2023-02-17.htm
      - AIG_10K_2024-02-14.htm
      - AIG_10K_2025-02-13.htm
      - AIG_10K_2026-02-12.htm
      - AllianceBernstein_10K_2017-02-14.htm
      - AllianceBernstein_10K_2018-02-13.htm
      - AllianceBernstein_10K_2019-02-13.htm
      - AllianceBernstein_10K_2020-02-12.htm

  - id: set_20
    description: "20-file multi-firm cohort — scale and skip regression"
    notes: >
      Full-scale test. Ingest 20 files from multiple firms, verify all chunks,
      re-ingest and verify 0 new / 20 skipped. Good for M4 Air validation.
    files:
      - AIG_10K_2021-02-19.htm
      - AIG_10K_2022-02-17.htm
      - AIG_10K_2023-02-17.htm
      - AIG_10K_2024-02-14.htm
      - AIG_10K_2025-02-13.htm
      - AIG_10K_2026-02-12.htm
      - AllianceBernstein_10K_2018-02-13.htm
      - AllianceBernstein_10K_2019-02-19.htm
      - AllianceBernstein_10K_2020-02-12.htm
      - AllianceBernstein_10K_2021-02-11.htm
      - AllianceBernstein_10K_2022-02-10.htm
      - AllianceBernstein_10K_2023-02-09.htm
      - AllianceBernstein_10K_2024-02-12.htm
      - AllianceBernstein_10K_2025-02-06.htm
      - Ameriprise_10K_2021-02-23.htm
      - Ameriprise_10K_2022-02-22.htm
      - Ameriprise_10K_2023-02-21.htm
