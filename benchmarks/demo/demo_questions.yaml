# AIStudio Demo Corpus — Benchmark Questions
# Version: 2.2.0
# Updated: 2026-06-16
# Schema: topic-grouped list (bench.py load_questions schema)
# v2.2 changes: Keyword pruning pass — removed keywords the corpus answers don't say.
#   Rule (Benchmarking Journey Phase 7): keywords must be terms the papers actually use,
#   not terms we expect. If the answer paraphrases correctly, don't fail it on a keyword.
#   Q4:  removed 'governance' (paper says 'risk management', not 'governance' in this context)
#   Q5:  removed 'roadmap' (paper says 'strategy', 'priorities', not 'roadmap' as a noun)
#   Q6:  removed 'future' (too generic; paper says 'target state', 'architecture')
#   Q7:  removed 'governance' (paper says 'program', 'organize', 'iterate')
#   Q8:  removed 'alignment' (paper says 'relationship', 'drives', not 'alignment' explicitly)
#   Q9:  removed 'legacy' from cloud migration Q (paper focuses on cloud readiness, not legacy)
#   Q10: simplified to terms paper actually uses ('legacy', 'moderniz')
#   Q12: removed 'transformation' (paper says 'digitization', 'changed', not 'transformation')
#   Q13: Verifier Law — added 'domains' as a softer alternative; kept Verifier
#   Q14: replaced 'imperatives' with 'verifiability' + 'deployment' (actual paper words)

