# AIStudio esef_banks Corpus — Benchmark Questions
# Version: 1.1.0
# Updated: 2026-06-16
# Schema: topic-grouped list (bench.py load_questions schema)
# Corpus: esef_banks (9 EN-primary firms ingested: ING, Barclays, HSBC, Standard Chartered,
#         BBVA, Nordea, SEB, Erste Group, KBC Group)
# Run with: ais_bench --corpus esef_banks
# For EN-primary subset only: ais_bench --corpus esef_banks --scope lang_en
#
# ENTITY_FILTER NOTE: entity_filter tokens must match the filename slug in uploads/.
# Corpus filename slugs: ING_Groep_N.V., Barclays_Bank_PLC, HSBC_Holdings_plc,
#   StandardChartered_Bank, Banco_Bilbao_Vizcaya_Argentaria,_S.A., Nordeakoncernen,
#   Skandinaviska_Enskilda_Banken_AB, Erste_Group_BankAG, KBC_Groep_NV
#
# ANNEX COVERAGE:
#   Annex 1 teaching cases: barclays_holdco_sub, erste_whitespace_collapse
#   Annex 3 language ceiling: bbva_climate (ES filer in EN), nordea_digital (localized name)
#   Benchmarking Journey: kbc_nii_sensitivity (nii_sensitivity), nordea_leverage_ratio

- topic: "Capital Adequacy"
  questions:
    - id: cet1_ing_group
      question: "How does ING Group describe its CET1 capital ratio and regulatory capital position in its most recent annual report?"
      keywords: [CET1, capital, ING, ratio, regulatory]
      entity_filter: [ING_Groep_N.V.]
      question_language: en
      language: en
      answer_location: prose_and_table
      section_count: single
      data_type: qualitative
      difficulty: standard
      entity_count: 1
      notes: "L1 baseline. ING files in English. Entity tag in corpus = 'ING Groep N.V.'."

    - id: tier1_capital_barclays
      question: "What is Barclays' Tier 1 capital ratio and what are the components of their capital stack?"
      keywords: [Tier 1, capital, ratio, Barclays, CET1]
      entity_filter: [Barclays_Bank_PLC]
      question_language: en
      language: en
      answer_location: prose_and_table
      section_count: single
      data_type: qualitative
      difficulty: standard
      entity_count: 1
      notes: "Annex 1 holdco/sub case. Entity in corpus = 'Barclays Bank PLC' (sub). Tests alias resolution."

    - id: leverage_ratio_hsbc
      question: "What is HSBC's leverage ratio and how does it compare to the regulatory minimum requirement?"
      keywords: [leverage, ratio, HSBC, regulatory, minimum]
      entity_filter: [HSBC_Holdings_plc]
      question_language: en
      language: en
      answer_location: prose_and_table
      section_count: single
      data_type: qualitative
      difficulty: standard
      entity_count: 1
      notes: "L1 table-located fact. Tests table extraction on a clean EN filer."

    - id: cet1_cross_firm_en
      question: "How do ING Group, HSBC, and Barclays compare in terms of their CET1 capital ratios and capital management approaches?"
      keywords: [CET1, capital, ING, HSBC, Barclays]
      entity_filter: [ING_Groep_N.V., HSBC_Holdings_plc, Barclays_Bank_PLC]
      question_language: en
      language: en
      answer_location: prose_and_table
      section_count: multi
      data_type: qualitative
      difficulty: standard
      entity_count: 3
      notes: "Cross-firm EN comparison. Tests entity isolation across 3 firms."

