# sec_10k_questions.yaml — DEFAULT set (= sec_10k_BIC_June_2026, replicated 2026-06-14)
# Q2/Q5/Q9/Q10 reworked to question shapes the system handles cleanly (target 10/10):
#   Q2 drops the AI-committee presupposition; Q5 reframed qualitative; Q9 qualitative; Q10 pinned single-figure.
# Replicated verbatim into sec_10k_questions.yaml (the default).
# Baseline benchmark questions with entity_filter for firm isolation.
# entity_filter: list of source_path substrings with OR semantics.
# Retrieval restricted to matching documents — no re-ingest required.
#
# Schema version: 1.5  (field schema unchanged since v1.5; the entry below is a data revision, not a schema bump)
# Data revision — 2026-06-14 — Wells Fargo removed from Q1/Q2/Q5: not in the sec_10k corpus (21 firms, no WFC).
#   entity_count adjusted (Q1 3→2, Q2/Q5 4→3); question text, keywords, entity_filter updated to match.
# v1.5 — 2026-06-02 — AIStudio_852/878: full Complexity-Ladder schema on all 10 questions.
#   Fields (each maps to one ladder ∂ so questions are filterable by axis, not just rung):
#     rung                 L1..L9 | mod    — composite ladder position
#     moniker              ladder_<rung>_<topic>_<n>
#     question_language    en | fr | ...   — X: language probe (L1b/c)
#     main_topic           subject category (capital, cyber, climate, digital, revenue, regulatory, ai_*)
#     entity_scope         single | multi  — X: L5 ∂ (entity_count kept as int)
#     data_type            qualitative | quantitative | mixed   — Y
#     temporal_scope       none | single_year | multi_year      — Y: L4/L6 ∂
#     temporal_expression  n/a | explicit | relative            — Y: L4 sub-∂
#     derived              true | false    — Y: L7 ∂ (stated vs must-compute)
#     answer_location      prose_only | prose_and_table | table_only  — Z: L2 ∂
#     section_scope        single | multi  — Z: L3 ∂ (was section_count)
#     cross_document       true | false    — Z: synthesis across ≥2 filings
#     expect_decline       true | false    — modifier: honesty (absent metric → decline)
#   Also: net_revenue_jpm keyword 'total revenue' → 'net revenue' (2026-06-02 audit: answer says
#   "total net revenue"; old token was a false-fail). Existing 7 rung-tagged (proposed L5/L6/L9).
# v1.4 — 2026-06-01 — AIStudio_852: 10-question build; added rung + moniker; 3 new ladder questions.
# v1.0–1.3 — see prior history (AIStudio_850 compliance-keyword fix; 851 latency_test retired 8→7).

- topic: AI Risk & Governance
  questions:
    - id: ai_disclosure_evolution
      rung: L6
      moniker: ladder_L6_ai_disclosure_evolution_1
      question: "When did JPMorgan and Bank of America first start disclosing AI as a specific risk factor in their 10-K filings, and what language do they use in their most recent filings?"
      keywords: [AI, risk, JPMorgan, Bank of America]
      entity_filter: [JPMorgan_Chase, Bank_of_America]
      question_language: en
      main_topic: ai_risk
      entity_scope: multi
      entity_count: 2
      data_type: qualitative
      temporal_scope: multi_year
      temporal_expression: relative
      derived: false
      answer_location: prose_only
      section_scope: multi
      cross_document: true
      expect_decline: false
      notes: Emergence-of-AI-risk-language framing; answerable with current corpus.

    - id: ai_governance_committees_comparison
      rung: L5
      moniker: ladder_L5_ai_governance_committees_1
      question: "How do JPMorgan, Bank of America, and Citigroup describe oversight of AI-related risk — through dedicated AI committees, or folded into their existing risk-governance structures?"
      keywords: [AI, risk, governance, oversight]
      entity_filter: [JPMorgan_Chase, Bank_of_America, Citigroup]
      question_language: en
      main_topic: ai_governance
      entity_scope: multi
      entity_count: 3
      data_type: qualitative
      temporal_scope: none
      temporal_expression: n/a
      derived: false
      answer_location: prose_only
      section_scope: multi
      cross_document: true
      expect_decline: false
      notes: Reframed (BIC) — drops the dedicated-AI-committee presupposition; the correct answer ('AI risk is folded into existing risk governance') scores clean and contains 'AI'. The presupposing original lives in the June_2026 set.

