# ── Entity records ───────────────────────────────────────────────────────────
# Populated by downloader from GLEIF API + corpus filename scan.
# canonical      — official GLEIF legal name (ALL CAPS, from API)
# lei            — 20-char LEI code (from API)
# jurisdiction   — ISO country code (from API)
# status         — ACTIVE | INACTIVE | MERGED (from API)
# corpus_name    — how firm appears in [Document:] chunk prefix (from corpus scan)
# corpus_files   — filename prefix pattern in uploads/ (from corpus scan)
# aliases        — query expansion targets (derived from canonical + corpus_name)
# ticker         — exchange ticker (from API or SEC EDGAR cross-reference)
# gleif_url      — direct link to GLEIF registry record

