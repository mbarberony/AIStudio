search_guidance: "Annual report (10-K) filings from major financial services firms\
  \ covering financial and business data for 5 fiscal years: 2021, 2022, 2023, 2024,\
  \ 2025. Downloaded from SEC EDGAR. Covers bulge-bracket banks, asset managers, exchanges,\
  \ and custody banks. \n\nRoute questions to the most relevant firm and filing year:\n\
  Topic routing:\n- AI risk, AI governance, artificial intelligence regulation, EU\
  \ AI Act → JPMorgan Chase, Bank of America, Citigroup, Goldman Sachs, Morgan Stanley.\
  \ AI risk language appears primarily in FY2023-2026 filings — do NOT expect it in\
  \ FY2021/2022 filings. If absent in early years, say so explicitly rather than saying\
  \ \"no information.\"\n- Cybersecurity risk management, information security, CISO,\
  \ cyberattack → JPMorgan Chase, Bank of America, Citigroup. Describe what each filing\
  \ says; if comparing years, note what changed or stayed the same.\n- Model risk\
  \ governance → Morgan Stanley, Goldman Sachs\n- Climate risk, ESG, Net Zero, transition\
  \ risk → Bank of America, Citigroup\n- CET1, capital ratios, total revenues, financials\
  \ → use entity_filter with firm names for precision. Financial data is in tables\
  \ — cite the filing and year even if exact numbers are hard to extract.\n- Digital\
  \ banking, technology investment, fintech → JPMorgan Chase, Bank of America, Citigroup\n\
  - Regulatory capital, Basel III, GSIB surcharge → JPMorgan Chase, Citigroup\n\n\
  When a question asks about evolution or changes over time: retrieve multiple years\
  \ for the same firm and compare what the filings say. If a topic appears in later\
  \ filings but not earlier ones, that IS the answer — state it explicitly.\n\nAnswer\
  \ directly from what the sources contain. Never say \"no information\" if the sources\
  \ contain related content — synthesize what IS there and note what is absent."
