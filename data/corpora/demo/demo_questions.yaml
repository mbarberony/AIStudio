# AIStudio — Demo Corpus Benchmark Questions
# Curated set of 12 questions validated against the demo corpus (March 2026)
# All 12 pass with citations on llama3.1:8b warm, avg latency ~6s
#
# Corpus: data/demo/demo_data — 15 documents, 1289 chunks
# 20+ years of original thought leadership in financial services technology
# architecture, spanning 2003–2021
#
# Usage:
#   python3 scripts/benchmark.py --corpus demo --top-k 5 --temperature 0.3
#   (auto-detected — no --questions flag needed)

- topic: Architecture Methodology
  questions:

    - id: qfd_technology_architecture
      question: What is QFD and how does it apply to technology architecture?
      keywords: [QFD, architecture]
      notes: >
        Tests retrieval of dedicated QFD documents (Architecture and QFD.pdf,
        BOEI - Architecture and QFD - 2003.pdf). Flagship demo question.

    - id: it_org_architectural_principles
      question: How do you design an IT organization around architectural principles?
      keywords: [organization, architecture, principles]
      notes: Retrieves from Architecting the IT Organization and FS Journal.

    - id: architecture_concepts_organizations
      question: How do architecture concepts help design organizations?
      keywords: [architecture, organization]
      notes: >
        Draws on the universal architecture toolset concept — one of the
        core intellectual contributions of the corpus.

- topic: IT Strategy & Leadership
  questions:

    - id: cto_three_year_strategy
      question: How should a CTO prioritize a three-year technology strategy?
      keywords: [CTO, strategy, technology]
      notes: >
        Consistently returns 5 citations across all models. Draws from
        FS Journal Strategy volume and Barbero 2020 modernization paper.

    - id: technology_target_state
      question: What does a good technology target state look like?
      keywords: [target state, technology]
      notes: Strong single-source answer from FS Journal Strategy volume.

    - id: large_scale_it_transformation
      question: How do you organize a large-scale IT transformation program?
      keywords: [transformation, program, IT]
      notes: Draws from GTIS Strategy document and FS Journal.

    - id: business_technology_strategy
      question: What is the relationship between business strategy and technology strategy?
      keywords: [business, strategy, technology]
      notes: >
        Core intellectual thread running through entire corpus — business
        strategy drives technology strategy, not the reverse.

- topic: Modern Technology
  questions:

    - id: cloud_migration_modernization
      question: What are the key considerations for cloud migration and technology modernization?
      keywords: [cloud, migration, modernization]
      notes: >
        Draws directly from Barbero 2020 Technology Modernization paper —
        original work with a principled-based approach framework.
        Replaces enterprise AI reference architecture question (weak retrieval).

    - id: modernizing_legacy_applications
      question: What are the key principles for modernizing legacy applications?
      keywords: [legacy, modernization, applications]
      notes: >
        Strong retrieval from Barbero 2020 Technology Modernization paper —
        original work, highly specific content.

- topic: Financial Services
  questions:

    - id: risk_compliance_financial_services
      question: What are the key risk and compliance considerations for financial services IT?
      keywords: [risk, compliance, financial services]
      notes: Retrieves from FS Journal Risk/Compliance/Security volume (2005).

    - id: digitization_financial_services
      question: How has digitization changed financial services technology?
      keywords: [digitization, financial services, technology]
      notes: >
        Retrieves from FS Journal Digitization volume. Clean single-source
        answer with good citation compliance.

    - id: architecture_technology_risk
      question: What is the role of architecture in managing technology risk in financial services?
      keywords: [architecture, risk, financial services]
      notes: >
        Good synthesis question drawing on multiple FS Journal volumes.
        Strong closer for a demo sequence.
